<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>İşçilər Siyahısı</h1>

    <div class="form">
        <input type="text" id="name" placeholder="Ad">
        <input type="text" id="surname" placeholder="Soyad">
        <input type="number" id="salary" placeholder="Maaş">
        <button id="addBtn">Yeni əlavə et</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Ad</th>
                <th>Soyad</th>
                <th>Maaş</th>
                <th>Əməliyyatlar</th>
            </tr>
        </thead>

        <tbody id="tbody">

        </tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
